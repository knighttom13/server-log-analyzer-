# ============================================
# 服务器日志智能分析 —— Docker 容器环境
# 一键启动：docker-compose up -d
# ============================================

services:
  # --- nginx Web 服务器 ---
  nginx:
    image: docker.m.daocloud.io/library/nginx:alpine
    container_name: log-analyzer-nginx
    user: root
    ports:
      - "8080:80"
    volumes:
      - ../logs/nginx:/var/log/nginx
      - ./nginx/html:/usr/share/nginx/html
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - log-analyzer-net

  # --- MySQL 数据库 ---
  mysql:
    image: docker.m.daocloud.io/library/mysql:8.0
    container_name: log-analyzer-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_pass
    volumes:
      - ../logs/mysql:/var/log/mysql
    restart: unless-stopped
    networks:
      - log-analyzer-net
    command: >
      --log-error=/var/log/mysql/error.log
      --slow-query-log=ON
      --slow-query-log-file=/var/log/mysql/slow.log
      --long-query-time=2

  # --- SSH 靶机 (模拟被攻击的 Linux 服务器) ---
  ssh-target:
    image: docker.m.daocloud.io/library/alpine:latest
    container_name: log-analyzer-ssh
    cap_add:
      - NET_ADMIN
      - NET_RAW
    ports:
      - "2222:22"
    volumes:
      - ../logs/ssh:/var/log
    restart: unless-stopped
    networks:
      - log-analyzer-net
    command: >
      sh -c "echo 'https://mirrors.aliyun.com/alpine/v3.20/main' > /etc/apk/repositories &&
             echo 'https://mirrors.aliyun.com/alpine/v3.20/community' >> /etc/apk/repositories &&
             apk add --no-cache openssh &&
             ssh-keygen -A &&
             echo 'root:rescue123' | chpasswd &&
             /usr/sbin/sshd -D"

  # --- 攻击面板 API (FastAPI) ---
  attack-api:
    image: docker.m.daocloud.io/library/python:3.12-slim
    container_name: log-analyzer-api
    environment:
      - CONTAINERIZED=true
    ports:
      - "9000:9000"
    volumes:
      - ../logs:/app/logs
      - ../reports:/app/reports
      - ../charts:/app/charts
      - ../src:/app/src
      - ../requirements.txt:/app/requirements.txt
    working_dir: /app
    command: >
      sh -c "pip install --no-cache-dir -r requirements.txt &&
             python -u src/attack_panel_api.py"
    restart: unless-stopped
    networks:
      - log-analyzer-net

networks:
  log-analyzer-net:
    driver: bridge
